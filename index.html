<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AuditLab · 大数据审计代码参考</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

<style>
  :root[data-theme="light"] {
    --bg: #fafafa;
    --surface: #ffffff;
    --hover: #f4f4f6;
    --border: #e7e7ec;
    --border-strong: #d4d4dc;
    --text: #1a1a1f;
    --text-mute: #6b6b78;
    --text-dim: #a0a0ac;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --code-bg: #fafafa;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
  }
  :root[data-theme="dark"] {
    --bg: #0d0d12;
    --surface: #16161d;
    --hover: #1d1d25;
    --border: #25252e;
    --border-strong: #34343f;
    --text: #e8e8ee;
    --text-mute: #9a9aa8;
    --text-dim: #5e5e6c;
    --accent: #818cf8;
    --accent-soft: rgba(129, 140, 248, 0.12);
    --code-bg: #0a0a10;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    transition: background 0.2s ease, color 0.2s ease;
  }

  /* ============ 顶部栏 ============ */
  .header {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--accent);
    color: white;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }
  .brand-sub {
    color: var(--text-dim);
    font-weight: 400;
    margin-left: 6px;
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  .view-switch {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
  }
  .view-btn {
    padding: 6px 10px;
    border: none;
    background: transparent;
    color: var(--text-mute);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-size: 12.5px;
    transition: all 0.15s ease;
  }
  .view-btn:hover { color: var(--text); }
  .view-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .view-btn svg { width: 14px; height: 14px; }

  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.15s ease;
  }
  .icon-btn:hover {
    background: var(--hover);
    color: var(--text);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ============ 主容器 ============ */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px;
  }

  /* ============ 面包屑 ============ */
  .crumbs {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-mute);
    margin-bottom: 18px;
    font-family: 'JetBrains Mono', monospace;
  }
  .crumb {
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 5px;
    transition: all 0.15s ease;
  }
  .crumb:hover {
    background: var(--hover);
    color: var(--text);
  }
  .crumb.current {
    color: var(--text);
    cursor: default;
  }
  .crumb.current:hover { background: transparent; }
  .crumb-sep { color: var(--text-dim); }

  /* ============ 表头 ============ */
  .list-header {
    display: grid;
    grid-template-columns: 1fr 130px 100px 110px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .list-header .col-right { text-align: right; }

  /* ============ 列表项 ============ */
  .list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 130px 100px 110px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s ease;
    align-items: center;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--hover); }
  .row .col-right { text-align: right; color: var(--text-mute); font-size: 13px; }

  .row-name {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .row-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .row-icon.folder {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .row-icon.file {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
  }
  .row-text { min-width: 0; }
  .row-title {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-desc {
    font-size: 12.5px;
    color: var(--text-mute);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-mute);
  }

  /* ============ 网格视图 ============ */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .grid-item {
    padding: 18px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .grid-item:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow-lg);
  }
  .grid-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    margin: 0 auto 10px;
    display: grid; place-items: center;
  }
  .grid-item.file .grid-icon {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-mute);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }
  .grid-title {
    font-weight: 500;
    font-size: 13.5px;
    line-height: 1.3;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .grid-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-mute);
  }

  /* ============ 代码详情页 ============ */
  .detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .detail-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .detail-info { min-width: 0; flex: 1; }
  .detail-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .detail-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .tag {
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .copy-btn {
    padding: 7px 13px;
    border-radius: 7px;
    background: var(--text);
    color: var(--surface);
    border: none;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .copy-btn:hover { opacity: 0.85; }
  .copy-btn.copied { background: #16a34a; color: white; }
  .copy-btn svg { width: 13px; height: 13px; }

  .detail-code {
    background: var(--code-bg);
  }
  .detail-code pre {
    margin: 0;
    padding: 22px 24px;
    overflow: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
  }
  .detail-code pre::-webkit-scrollbar { height: 8px; width: 8px; }
  .detail-code pre::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .detail-code pre::-webkit-scrollbar-track { background: transparent; }

  /* ============ 空状态 ============ */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-mute);
  }

  /* ============ Toast ============ */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text);
    color: var(--surface);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ============ 动画 ============ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .view, .detail { animation: fadeIn 0.2s ease both; }

  /* ============ 响应式 ============ */
  @media (max-width: 700px) {
    .header { padding: 14px 18px; }
    .container { padding: 20px 18px; }
    .list-header, .row {
      grid-template-columns: 1fr 80px;
    }
    .col-hide { display: none; }
    .detail-head { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="brand-mark">A/</div>
    <span>AuditLab</span>
    <span class="brand-sub">大数据审计</span>
  </div>
  <div class="header-actions">
    <div class="view-switch">
      <button class="view-btn active" id="viewList">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        列表
      </button>
      <button class="view-btn" id="viewGrid">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        网格
      </button>
    </div>
    <button class="icon-btn" id="themeToggle" title="切换主题">
      <svg id="iconDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="iconLight" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
  </div>
</header>

<main class="container">
  <div class="crumbs" id="crumbs"></div>
  <div id="content"></div>
</main>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
  /* ============ 数据 ============ */
  const labs = [
    {
      id: 'first-task-1',
      no: '第一次',
      title: '初步业务活动之舆情分析',
      desc: '舆情评论、股价数据清洗、JIEBA 分词与词频计算',
      tasks: [
        {
          no: '任务一',
          title: '第一次-任务一',
          tags: ['pandas', '舆情分析', '数据清洗'],
          code: `import numpy as np
import pandas as pd

df = pd.read_csv("实战演练-初步业务活动之舆情分析/数据源01评论数据.csv")

df["帖子阅读量"] = df["帖子总数量"] * df["帖子平均阅读量"]
df["帖子评论量"] = df["帖子总数量"] * df["帖子平均评论量"]
df["帖子点赞量"] = df["帖子总数量"] * df["帖子平均点赞量"]

data = df.loc[:, ["发帖日期", "帖子总数量", "帖子阅读量", "帖子评论量", "帖子点赞量"]]
data.to_csv("评论数据清洗.csv", encoding="utf-8-sig")

data2 = df.loc[:, ["发帖日期", "积极帖子数量", "中立帖子数量", "消极帖子数量"]]
data2.to_csv("量化情绪指标.csv", encoding="utf-8-sig")`
        },
        {
          no: '任务2',
          title: '第一次-任务2',
          tags: ['pandas', '股价数据', '数据清洗'],
          code: `import numpy as np
import pandas as pd

df = pd.read_csv("实战演练-初步业务活动之舆情分析/数据源02股价数据.csv", header=1)[1:]

df = df.fillna(value=0)

data = df.loc[:, ['交易日期', '日最高价', '日最低价', '日收盘价', '日开盘价']]
data.to_csv("股价数据清洗.csv", encoding='utf-8-sig')`
        },
        {
          no: '任务3',
          title: '第一次-任务3',
          tags: ['pandas', '舆情分析', '数据清洗'],
          code: `import numpy as np
import pandas as pd

df = pd.read_csv("实战演练-初步业务活动之舆情分析/数据源01评论数据.csv")

df["帖子阅读量"]=df['帖子总数量']*df['帖子平均阅读量']
df["帖子评论量"]=df['帖子总数量']*df['帖子平均评论量']
df["帖子点赞量"]=df['帖子总数量']*df['帖子平均点赞量']

data=df.loc[:,["发帖日期",'帖子总数量','帖子阅读量','帖子评论量','帖子点赞量']]
data.to_csv("评论数据清洗.csv",encoding='utf-8-sig')

data2=df.loc[:,["发帖日期",'积极帖子数量','中立帖子数量','消极帖子数量']]
data2.to_csv("量化情绪指标.csv",encoding='utf-8-sig')`
        },
        {
          no: '任务4',
          title: '第一次-任务4：JIEBA分词',
          tags: ['pandas', 'jieba', '分词'],
          code: `import pandas as pd
import numpy as np
import jieba

df = pd.read_csv("文本数据清洗.csv")

stopword = pd.read_csv("实战演练-初步业务活动之舆情分析/数据源04stoplist.csv")
stopword = stopword["停用词"].to_list()

jieba.load_userdict("实战演练-初步业务活动之舆情分析/数据源06保留词库dict.txt")

# 制作分词函数
def cutword(text):
    text = str(text)
    cutwords = jieba.lcut(text)
    cutwords = pd.Series(cutwords)
    cutwords = ' '.join(cutwords[~cutwords.isin(stopword)])
    return cutwords

# 执行分词
df["分词"] = df["文本_清洗后"].apply(cutword)
df.to_csv("./jieba分词结果.csv")
print("ok")`
        },
        {
          no: '任务5',
          title: '第一次-任务5：词频计算',
          tags: ['pandas', 'Counter', '词频'],
          code: `import pandas as pd
import numpy as np
from collections import Counter

df = pd.read_csv("jieba分词结果.csv")

df['分词'] = df['分词'].astype(str)
text = ' '.join(df['分词'])
text = text.split()
counter = Counter(text)

data1 = counter.most_common(100)
data1 = pd.DataFrame(data1, columns=['词语', '出现次数'])
data1 = data1[data1["词语"] != "明康"]
data1 = data1[data1["词语"] != "药业"]
data1 = data1[data1["词语"] != "生物"]
data1.to_csv('词云图结果.csv', encoding='utf-8-sig')

data2 = counter.most_common()
data2 = pd.DataFrame(data2, columns=['词语', '出现次数'])

df_fina = pd.read_excel("实战演练-初步业务活动之舆情分析/数据源05财务词汇.xlsx")
df_merge = pd.merge(data2, df_fina, left_on='词语', right_on='关注词', how='inner')
df_merge.to_csv('关注词结果.csv', encoding='utf-8-sig')`
        }
      ]
    }
  ];

  /* ============ 状态 ============ */
  let currentView = 'list';        // 'list' | 'grid'
  let currentLab = null;            // 当前 lab id，null 表示在根目录
  let currentTask = null;           // 当前 task 索引，null 表示未进入详情

  /* ============ 工具函数 ============ */
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function fileIcon() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>`;
  }
  function folderIcon() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>`;
  }

  /* ============ 渲染 ============ */
  function render() {
    renderCrumbs();
    const content = document.getElementById('content');

    if (currentTask !== null) {
      content.innerHTML = renderDetail();
      hljs.highlightElement(content.querySelector('pre code'));
      bindDetailEvents();
      return;
    }

    if (currentLab === null) {
      // 根目录：列出所有 Lab
      const items = labs.map(lab => ({
        type: 'folder',
        title: `${lab.no} · ${lab.title}`,
        desc: lab.desc,
        meta: `${lab.tasks.length} 题`,
        size: `${lab.tasks.length} items`,
        onClick: () => { currentLab = lab.id; render(); }
      }));
      content.innerHTML = renderView(items);
    } else {
      // Lab 内部：列出所有 Task
      const lab = labs.find(l => l.id === currentLab);
      const items = lab.tasks.map((t, idx) => ({
        type: 'file',
        title: `${t.no} · ${t.title}`,
        desc: t.tags.map(tag => '#' + tag).join('  '),
        meta: `${t.code.split('\n').length} 行`,
        size: `${t.code.split('\n').length} lines`,
        ext: 'PY',
        onClick: () => { currentTask = idx; render(); }
      }));
      content.innerHTML = renderView(items);
    }

    bindRowEvents();
  }

  function renderCrumbs() {
    const crumbs = document.getElementById('crumbs');
    let html = `<span class="crumb ${currentLab === null ? 'current' : ''}" data-jump="root">~ / AuditLab</span>`;

    if (currentLab !== null) {
      const lab = labs.find(l => l.id === currentLab);
      html += `<span class="crumb-sep">/</span>`;
      html += `<span class="crumb ${currentTask === null ? 'current' : ''}" data-jump="lab">${lab.no}</span>`;

      if (currentTask !== null) {
        html += `<span class="crumb-sep">/</span>`;
        html += `<span class="crumb current">${escapeHtml(lab.tasks[currentTask].no)}</span>`;
      }
    }
    crumbs.innerHTML = html;

    crumbs.querySelectorAll('.crumb').forEach(c => {
      c.addEventListener('click', () => {
        const jump = c.dataset.jump;
        if (jump === 'root') { currentLab = null; currentTask = null; render(); }
        else if (jump === 'lab') { currentTask = null; render(); }
      });
    });
  }

  function renderView(items) {
    if (currentView === 'list') {
      return `
        <div class="view">
          <div class="list-header">
            <div>名称</div>
            <div class="col-hide">标签 / 描述</div>
            <div class="col-hide">类型</div>
            <div class="col-right">大小</div>
          </div>
          <div class="list">
            ${items.map((it, i) => `
              <div class="row" data-idx="${i}">
                <div class="row-name">
                  <div class="row-icon ${it.type === 'folder' ? 'folder' : 'file'}">
                    ${it.type === 'folder' ? folderIcon() : (it.ext || fileIcon())}
                  </div>
                  <div class="row-text">
                    <div class="row-title">${escapeHtml(it.title)}</div>
                    <div class="row-desc">${escapeHtml(it.desc)}</div>
                  </div>
                </div>
                <div class="col-hide row-meta">${escapeHtml(it.desc)}</div>
                <div class="col-hide row-meta">${it.type === 'folder' ? '文件夹' : 'Python'}</div>
                <div class="col-right">${escapeHtml(it.size)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      return `
        <div class="view grid-view">
          ${items.map((it, i) => `
            <div class="grid-item ${it.type}" data-idx="${i}">
              <div class="grid-icon">
                ${it.type === 'folder' ? folderIcon() : (it.ext || fileIcon())}
              </div>
              <div class="grid-title">${escapeHtml(it.title)}</div>
              <div class="grid-meta">${escapeHtml(it.meta)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }
  }

  function bindRowEvents() {
    document.querySelectorAll('.row, .grid-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        if (currentLab === null) {
          currentLab = labs[idx].id;
        } else {
          currentTask = idx;
        }
        render();
      });
    });
  }

  function renderDetail() {
    const lab = labs.find(l => l.id === currentLab);
    const t = lab.tasks[currentTask];
    return `
      <div class="detail">
        <div class="detail-head">
          <div class="detail-info">
            <div class="detail-title">${escapeHtml(t.title)}</div>
            <div class="row-desc" style="font-family:'JetBrains Mono',monospace;font-size:12px;">
              ${lab.no} / ${escapeHtml(t.no)} · ${t.code.split('\n').length} 行
            </div>
            <div class="detail-tags">
              ${t.tags.map(x => `<span class="tag">${escapeHtml(x)}</span>`).join('')}
            </div>
          </div>
          <button class="copy-btn" id="copyBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>复制代码</span>
          </button>
        </div>
        <div class="detail-code">
          <pre><code class="language-python">${escapeHtml(t.code)}</code></pre>
        </div>
      </div>
    `;
  }

  function bindDetailEvents() {
    const btn = document.getElementById('copyBtn');
    const lab = labs.find(l => l.id === currentLab);
    const code = lab.tasks[currentTask].code;
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(code).then(() => {
        btn.classList.add('copied');
        btn.querySelector('span').textContent = '已复制';
        showToast('已复制到剪贴板');
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.querySelector('span').textContent = '复制代码';
        }, 1800);
      });
    });
  }

  /* ============ 视图切换 ============ */
  document.getElementById('viewList').addEventListener('click', () => {
    currentView = 'list';
    document.getElementById('viewList').classList.add('active');
    document.getElementById('viewGrid').classList.remove('active');
    if (currentTask === null) render();
  });
  document.getElementById('viewGrid').addEventListener('click', () => {
    currentView = 'grid';
    document.getElementById('viewGrid').classList.add('active');
    document.getElementById('viewList').classList.remove('active');
    if (currentTask === null) render();
  });

  /* ============ 主题切换 ============ */
  const themeToggle = document.getElementById('themeToggle');
  const iconDark = document.getElementById('iconDark');
  const iconLight = document.getElementById('iconLight');
  const hljsTheme = document.getElementById('hljs-theme');

  themeToggle.addEventListener('click', () => {
    const isLight = document.documentElement.dataset.theme === 'light';
    document.documentElement.dataset.theme = isLight ? 'dark' : 'light';
    iconDark.style.display = isLight ? 'none' : '';
    iconLight.style.display = isLight ? '' : 'none';
    hljsTheme.href = isLight
      ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css'
      : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css';
    if (currentTask !== null) {
      setTimeout(() => {
        const code = document.querySelector('pre code');
        if (code) {
          code.removeAttribute('data-highlighted');
          hljs.highlightElement(code);
        }
      }, 50);
    }
  });

  /* ============ Toast ============ */
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  /* ============ 初始化 ============ */
  render();
</script>
</body>
</html>
